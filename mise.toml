[tools]
node = "24"

[tasks.default]
depends = ["start"]
description = "Run start task"

[tasks.start]
description = "Run the CLI locally with the default mise Node version"
run = "mise exec node@24 -- node src/cli.js"

[tasks.test]
description = "Run the automated test suite with the default mise Node version"
run = "mise exec node@24 -- npm test"

[tasks.test-node20]
description = "Run the automated test suite on Node 20"
run = "mise exec node@20 -- npm test"

[tasks.test-node22]
description = "Run the automated test suite on Node 22"
run = "mise exec node@22 -- npm test"

[tasks.test-node24]
description = "Run the automated test suite on Node 24"
run = "mise exec node@24 -- npm test"

[tasks.test-matrix]
description = "Run the automated test suite on every supported CI Node version"
run = """
mise run test-node20
mise run test-node22
mise run test-node24
"""

[tasks.pack]
description = "Dry-run the publishable npm tarball"
run = "mise exec node@24 -- npm pack --dry-run"

[tasks.smoke]
description = "Pack the tarball and smoke-test installation through npx"
run = """
set -eu
PACK_DIR=\"$(mktemp -d \"${TMPDIR:-/tmp}/asi-pack.XXXXXX\")\"
PROJECT_DIR=\"$(mktemp -d \"${TMPDIR:-/tmp}/asi-smoke.XXXXXX\")\"
CACHE_DIR=\"$(mktemp -d \"${TMPDIR:-/tmp}/asi-npm-cache.XXXXXX\")\"
cleanup() {
  rm -rf \"$PACK_DIR\" \"$PROJECT_DIR\" \"$CACHE_DIR\"
}
trap cleanup EXIT INT TERM
TARBALL=\"$(mise exec node@24 -- npm pack --silent --pack-destination \"$PACK_DIR\")\"
NPM_CONFIG_CACHE=\"$CACHE_DIR\" mise exec node@24 -- npx --yes --package \"$PACK_DIR/$TARBALL\" agent-skills-installer install all --scope project --cwd \"$PROJECT_DIR\"
test -f \"$PROJECT_DIR/.codex/skills/playwright/agents/openai.yaml\"
test -f \"$PROJECT_DIR/.claude/skills/playwright/scripts/playwright_cli.sh\"
test -f \"$PROJECT_DIR/.gemini/skills/playwright/references/cli.md\"
test ! -e \"$PROJECT_DIR/.gemini/skills/playwright/agents/openai.yaml\"
"""

[tasks.verify]
description = "Run the default local verification flow"
run = """
mise run test
mise run pack
mise run smoke
"""
