name: CI and Publish Package

on:
  push:
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm after verification
        required: false
        default: false
        type: boolean
      version:
        description: Package version to verify against package.json
        required: true
        type: string
      tag:
        description: Git tag to verify, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
    env:
      npm_config_cache: ${{ runner.temp }}/npm-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Validate workflow_dispatch version and tag
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          EXPECTED_TAG="v${INPUT_VERSION}"

          if [ "$PACKAGE_VERSION" != "$INPUT_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match workflow input version ($INPUT_VERSION)." >&2
            exit 1
          fi

          if [ "$INPUT_TAG" != "$EXPECTED_TAG" ]; then
            echo "workflow input tag ($INPUT_TAG) does not match expected tag ($EXPECTED_TAG)." >&2
            exit 1
          fi

      - name: Validate release tag against package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "release tag ($RELEASE_TAG) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Verify pack output
        run: npm pack --dry-run

      - name: Pack tarball
        id: pack
        run: |
          TARBALL="$(npm pack --silent)"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Verify packed tarball with npx smoke test
        run: |
          PROJECT_DIR="${RUNNER_TEMP}/agent-skills-installer-smoke-${{ matrix.node-version }}"
          mkdir -p "$PROJECT_DIR"

          npx --yes --package "./${{ steps.pack.outputs.tarball }}" agent-skills-installer install all --scope project --cwd "$PROJECT_DIR"

          test -f "$PROJECT_DIR/.agents/skills/instruction-only/SKILL.md"
          test -f "$PROJECT_DIR/.claude/skills/instruction-only/SKILL.md"
          test -f "$PROJECT_DIR/.gemini/skills/script-backed/scripts/print_context.sh"
          test -x "$PROJECT_DIR/.gemini/skills/script-backed/scripts/print_context.sh"

  publish:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
