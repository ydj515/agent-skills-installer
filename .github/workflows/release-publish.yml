name: Release Publish Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify Release (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
          - 24
    env:
      npm_config_cache: ${{ runner.temp }}/npm-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Validate release tag against package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "release tag ($RELEASE_TAG) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Verify pack output
        run: npm pack --dry-run

      - name: Pack tarball
        id: pack
        run: |
          TARBALL="$(npm pack --silent)"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Verify packed tarball with npx smoke test
        run: |
          PROJECT_DIR="${RUNNER_TEMP}/agent-skills-installer-release-smoke-${{ matrix.node-version }}"
          mkdir -p "$PROJECT_DIR"

          npx --yes --package "./${{ steps.pack.outputs.tarball }}" agent-skills-installer install all --scope project --cwd "$PROJECT_DIR"

          test -f "$PROJECT_DIR/.codex/skills/playwright/agents/openai.yaml"
          test -f "$PROJECT_DIR/.claude/skills/playwright/scripts/playwright_cli.sh"
          test -f "$PROJECT_DIR/.gemini/skills/playwright/references/cli.md"
          test ! -e "$PROJECT_DIR/.gemini/skills/playwright/agents/openai.yaml"

  publish:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
